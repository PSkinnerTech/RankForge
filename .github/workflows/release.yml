name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run verification and packing without publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  publish-cli:
    runs-on: ubuntu-latest
    env:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm audit --omit=dev
      - run: npm test
      - run: npm run validate
      - run: npm pack --dry-run --workspace packages/cli
      - name: Publish CLI package
        if: ${{ inputs.dry_run == 'false' && env.NPM_TOKEN != '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --workspace packages/cli --access public
      - name: Require NPM token
        if: ${{ inputs.dry_run == 'false' && env.NPM_TOKEN == '' }}
        run: |
          echo "NPM_TOKEN is required to publish."
          exit 1
