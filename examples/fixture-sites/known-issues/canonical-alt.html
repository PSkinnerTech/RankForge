<html lang="en">
  <head>
    <title>Canonical Alternate Fixture</title>
    <meta name="description" content="A sitemap-listed page that canonicalizes to a different URL.">
    <link rel="canonical" href="/canonical.html">
  </head>

    <h1>Canonical Alternate Fixture</h1>
    <h2>Sitemap and canonical coverage</h2>

      appearance findings.
    </p>
  </body>
</html>
